name: Deploy Frontend to ECR and EC2

on:
  push:
    branches: [ deploy ] # Se ejecuta solo al hacer push a la rama 'deploy'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4 # <-- Actualizado a v4

    - name: Configurar credenciales AWS (Vocareum / Academy)
      uses: aws-actions/configure-aws-credentials@v4 # <-- Actualizado a v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} 
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Iniciar sesión en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2 # <-- Actualizado a v2

    - name: Build, tag, and push a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: frontend-ep2 
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Desplegar en EC2
      uses: appleboy/ssh-action@v1.0.3 # <-- Versión estable moderna
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          cd ~/Proyecto_DevOps
          sudo docker-compose pull frontend
          sudo docker-compose up -d --no-deps frontend
